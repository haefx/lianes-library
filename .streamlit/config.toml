[theme]
base = "light"
primaryColor = "#4F46E5"
backgroundColor = "#E9EEF6"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#0F172A"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true

[client]
# Uncaught exceptions zeigen im Browser nur eine generische Meldung.
# Vollständige Details (Typ, Message, Traceback) landen weiterhin in der Konsole.
showErrorDetails = "none"
